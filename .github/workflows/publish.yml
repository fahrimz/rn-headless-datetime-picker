name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # OIDC token used by npm for Trusted Publishing + provenance attestation.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: yarn prepare

      - name: Publish to npm
        # No NPM_TOKEN — npm exchanges the OIDC token for a short-lived publish credential.
        # Assumes CI on main already passed for this commit; release-it runs lint/test/typecheck locally before tagging.
        run: npm publish --provenance --access public
