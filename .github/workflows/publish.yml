name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # OIDC token used by npm to mint the provenance attestation that links
      # the published tarball back to this commit + workflow run.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test --ci

      - name: Build
        run: yarn prepare

      - name: Publish to npm
        # Trusted Publishing via OIDC — workflow has id-token: write, no NPM_TOKEN needed.
        run: npm publish --provenance --access public
