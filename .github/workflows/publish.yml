# Release pipeline driven by release-please.
#
# On every push to main, release-please scans conventional commits since the
# last release tag. If new releaseable commits exist it opens or updates a
# "chore(main): release v<x>" PR that bumps package.json and updates
# CHANGELOG.md. When that PR is merged, release-please creates the GitHub
# release + tag, which triggers the publish job in the same workflow run.
#
# Filename intentionally kept as publish.yml so the npm Trusted Publisher
# config (which pins the workflow filename in the OIDC subject claim) keeps
# matching without a manual update on npmjs.com.

name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-please:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # create release tag + GitHub release
      pull-requests: write  # open/update the release PR

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # OIDC token used by npm for Trusted Publishing + provenance attestation.
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: yarn prepare

      - name: Publish to npm
        # No NPM_TOKEN — npm exchanges the OIDC token for a short-lived publish credential.
        run: npm publish --provenance --access public
